services:
  - type: web
    name: ai-product-analyzer
    env: python
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./product_analyzer.db
      - key: PYTHON_VERSION
        value: 3.11.0
